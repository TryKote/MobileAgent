# ProGuard configuration for MobileAgent J2ME

# J2ME preverification
-microedition

# Entry point: MIDlet class referenced in MANIFEST.MF
-keep public class com.trykote.mobileagent.core.Midlet

# Shrink + obfuscate only (no optimization — BC class hierarchy conflicts)
-dontoptimize
-allowaccessmodification
-overloadaggressively
-repackageclasses ''

# Diagnostics
-printmapping build/proguard-mapping.txt

# Suppress warnings for J2ME library classes
-dontwarn
